<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PokeRumble - Battle Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding-top: 0; }
        #game-container { height: 92vh; }

        /* ── POST GAME OVERLAY ── */
        #postgame-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 300;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 16px;
            font-family: 'Press Start 2P', monospace;
            overflow-y: auto;
            padding: 20px 0;
        }
        #postgame-overlay.show { display: flex; }

        .postgame-card {
            background: #1e272e;
            border: 2px solid #34495e;
            border-radius: 16px;
            padding: 24px 32px;
            width: 92%;
            max-width: 860px;
        }

        .pg-title {
            font-size: 0.5rem;
            color: #ffcb05;
            letter-spacing: 2px;
            margin-bottom: 14px;
            border-bottom: 1px solid #34495e;
            padding-bottom: 10px;
        }

        #winner-banner {
            text-align: center;
            font-size: 1rem;
            color: #ffcb05;
            letter-spacing: 3px;
            animation: glow 1.5s infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(255,203,5,0.4); }
            to   { text-shadow: 0 0 30px rgba(255,203,5,1); }
        }

        .pg-columns { display: flex; gap: 16px; }
        .pg-col { flex: 1; }

        #vote-list, #wins-list {
            display: flex;
            flex-direction: column;
            gap: 7px;
            max-height: 220px;
            overflow-y: auto;
        }

        .vote-row, .wins-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.42rem;
        }
        .wins-row.top { border-left: 3px solid #ffcb05; }

        .vote-name, .wins-name { flex: 1; color: #ecf0f1; }
        .wins-rank { color: #ffcb05; width: 18px; text-align: center; }
        .wins-count { color: #2ecc71; }

        .badge {
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 0.38rem;
            letter-spacing: 0.5px;
        }
        .badge-play  { background: #27ae60; color: #fff; }
        .badge-quit  { background: #c0392b; color: #fff; }
        .badge-wait  { background: #555;    color: #aaa; }

        #vote-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .pg-btn {
            font-family: 'Press Start 2P', monospace;
            padding: 13px 26px;
            font-size: 0.6rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 1px;
        }
        .pg-btn:hover { transform: scale(1.04); }
        .pg-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
        .pg-btn-play { background: #27ae60; color: white; box-shadow: 0 4px 16px rgba(39,174,96,0.4); }
        .pg-btn-play:hover:not(:disabled) { background: #2ecc71; }
        .pg-btn-quit { background: #c0392b; color: white; }
        .pg-btn-quit:hover:not(:disabled) { background: #e74c3c; }

        #vote-tally { text-align: center; font-size: 0.45rem; color: #aaa; margin-bottom: 12px; }
        #vote-tally b { color: #ffcb05; }
        #restart-countdown { text-align: center; font-size: 0.45rem; color: #777; margin-top: 12px; }
        #restart-countdown span { color: #ffcb05; }
    </style>
</head>
<body>

    <!-- ── POST GAME OVERLAY ── -->
    <div id="postgame-overlay">
        <div class="postgame-card" style="text-align:center; padding:18px 32px;">
            <div class="pg-title">🏆 BATTLE RESULT</div>
            <div id="winner-banner">---</div>
        </div>

        <div class="postgame-card">
            <div class="pg-columns">
                <div class="pg-col">
                    <div class="pg-title">📊 PLAYER VOTES</div>
                    <div id="vote-list"></div>
                </div>
                <div class="pg-col">
                    <div class="pg-title">🏅 LOBBY WINS</div>
                    <div id="wins-list"></div>
                </div>
            </div>
        </div>

        <div class="postgame-card" style="padding:18px 32px;">
            <div id="vote-tally">
                <b id="play-vote-count">0</b> / <b id="total-player-count">?</b> voted Play Again
            </div>
            <div id="vote-buttons">
                <button class="pg-btn pg-btn-play" id="btn-play-again" onclick="votePlayAgain()">▶ PLAY AGAIN</button>
                <button class="pg-btn pg-btn-quit" id="btn-quit"       onclick="voteQuit()">✖ QUIT</button>
            </div>
            <div id="restart-countdown">Auto-restarting in <span id="pg-timer">15</span>s</div>
        </div>
    </div>

    <!-- ── SELECTION OVERLAY ── -->
    <div id="selection-overlay">
        <div id="selection-panel">
            <h2>CHOOSE YOUR POKEMON</h2>
            <div id="timer-display">60</div>
            <div id="pokemon-grid"></div>
            <button id="start-battle-btn" class="hidden" onclick="startBattle()">START BATTLE</button>
        </div>
    </div>

    <!-- ── GAME LAYOUT ── -->
    <div id="game-container">
        <div id="hp-sidebar">
            <div id="player-profile" class="hidden">
                <div class="sidebar-header">CURRENT MATCHUP</div>
                <div class="profile-display">
                    <div class="matchup-slot">
                        <div id="fainted-overlay" class="hidden">FAINTED</div>
                        <img id="chosen-pkmn-sprite" src="" alt="You">
                    </div>
                    <div class="vs-symbol">VS</div>
                    <div class="matchup-slot">
                        <img id="target-pkmn-sprite" src="" alt="Target">
                    </div>
                </div>
            </div>
            <div class="sidebar-header">TEAM STATUS</div>
            <div id="hp-list"></div>
        </div>

        <div id="arena-wrapper">
            <div id="status-banner">WAITING FOR SELECTION...</div>
            <canvas id="arena" width="800" height="600"></canvas>
        </div>

        <div id="log-sidebar">
            <div id="log-header">BATTLE FEED</div>
            <div id="log-content"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
